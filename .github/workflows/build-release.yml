name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"           # triggers on any v0.0.0, v1.2.3, etc.
  workflow_dispatch:       # manual trigger from GitHub Actions tab

permissions:
  contents: write          # needed to upload release assets

jobs:
  # ──────────────────────────────────────────────
  #  Windows — build SNR_Meter.exe
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 sounddevice numpy pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller build_exe.spec --clean --noconfirm

      - name: Verify output
        run: |
          dir dist
          if (!(Test-Path "dist\SNR_Meter.exe")) {
            Write-Error "SNR_Meter.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist\SNR_Meter.exe").length / 1MB
          Write-Host "SNR_Meter.exe built successfully — $([math]::Round($size,1)) MB"
        shell: pwsh

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNR_Meter_Windows
          path: dist/SNR_Meter.exe
          retention-days: 7

  # ──────────────────────────────────────────────
  #  Publish to GitHub Release
  # ──────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows      # wait for Windows build to finish
    if: startsWith(github.ref, 'refs/tags/')   # only on tag pushes

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SNR_Meter_Windows
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Upload .exe to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "SNR Meter ${{ steps.version.outputs.VERSION }}"
          body: |
            ## SNR Meter ${{ steps.version.outputs.VERSION }}

            ### Download
            | File | Platform |
            |------|----------|
            | `SNR_Meter.exe` | Windows 10/11 (64-bit) — **no install needed, just run** |

            ### Quick Start
            1. Download `SNR_Meter.exe` below
            2. Double-click to run — no Python required
            3. Select microphone → Record Signal → Record Noise → See SNR result

            ### Or install via pip
            ```bash
            pip install snr-meter
            snr-meter
            ```

            ---
            See [README](https://github.com/AutoStudyP/RMS_exe_installer#readme) for full documentation.
          files: artifacts/SNR_Meter.exe
          fail_on_unmatched_files: true
